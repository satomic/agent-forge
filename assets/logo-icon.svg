<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" shape-rendering="crispEdges">
  <defs>
    <radialGradient id="glow" cx="50%" cy="42%" r="38%">
      <stop offset="0%" stop-color="#FF6B35" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FF3D00" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="anvil" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C9D1D9"/>
      <stop offset="100%" stop-color="#8B949E"/>
    </linearGradient>
    <linearGradient id="hammer" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8B949E"/>
      <stop offset="100%" stop-color="#6E7681"/>
    </linearGradient>
    <linearGradient id="handle" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C4A1E"/>
      <stop offset="50%" stop-color="#9A6534"/>
      <stop offset="100%" stop-color="#7C4A1E"/>
    </linearGradient>
    <linearGradient id="cpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1F6FEB"/>
      <stop offset="100%" stop-color="#6E40C9"/>
    </linearGradient>
  </defs>

  <style>
    @keyframes strike {
      0%{transform:rotate(0)}15%{transform:rotate(-16deg)}35%{transform:rotate(5deg)}50%{transform:rotate(0)}100%{transform:rotate(0)}
    }
    .hg{transform-origin:40px 24px;animation:strike 2.4s ease-in-out infinite}

    @keyframes sp1{0%,30%{transform:translate(0,0);opacity:0}35%{opacity:1}55%{transform:translate(-8px,-10px);opacity:0}100%{opacity:0}}
    @keyframes sp2{0%,30%{transform:translate(0,0);opacity:0}35%{opacity:1}55%{transform:translate(6px,-12px);opacity:0}100%{opacity:0}}
    @keyframes sp3{0%,32%{transform:translate(0,0);opacity:0}37%{opacity:1}57%{transform:translate(-10px,-6px);opacity:0}100%{opacity:0}}
    @keyframes sp4{0%,33%{transform:translate(0,0);opacity:0}38%{opacity:1}58%{transform:translate(4px,-14px);opacity:0}100%{opacity:0}}
    .s1{animation:sp1 2.4s ease-out infinite}
    .s2{animation:sp2 2.4s ease-out infinite}
    .s3{animation:sp3 2.4s ease-out infinite}
    .s4{animation:sp4 2.4s ease-out infinite}

    @keyframes gp{0%{opacity:0.3}50%{opacity:0.7}100%{opacity:0.3}}
    .gl{animation:gp 3s ease-in-out infinite}

    @keyframes tw{0%{transform:scale(0);opacity:0}50%{transform:scale(1);opacity:1}100%{transform:scale(0);opacity:0}}
    .tk1{transform-origin:52px 10px;animation:tw 2s ease-in-out 0.5s infinite}
    .tk2{transform-origin:8px 14px;animation:tw 2s ease-in-out 1.2s infinite}
  </style>

  <!-- Glow -->
  <ellipse class="gl" cx="32" cy="32" rx="20" ry="16" fill="url(#glow)" opacity="0.5"/>

  <!-- Anvil -->
  <rect x="18" y="48" width="28" height="4" rx="1" fill="url(#anvil)"/>
  <rect x="22" y="38" width="20" height="10" rx="1" fill="url(#anvil)"/>
  <rect x="24" y="36" width="16" height="4" rx="1" fill="#8B949E"/>
  <rect x="16" y="32" width="32" height="4" rx="1" fill="#C9D1D9"/>
  <polygon points="16,32 16,36 10,34" fill="#AFB8C1"/>
  <rect x="46" y="32" width="4" height="4" rx="1" fill="#AFB8C1"/>
  <rect x="17" y="32" width="30" height="1" fill="rgba(255,255,255,0.15)"/>
  <rect x="26" y="32" width="8" height="2" rx="1" fill="#FF6B35" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.4s" repeatCount="indefinite"/>
  </rect>

  <!-- Hammer -->
  <g class="hg">
    <rect x="28" y="14" width="2" height="18" rx="1" fill="url(#handle)" transform="rotate(-8,29,23)"/>
    <rect x="22" y="10" width="14" height="6" rx="1" fill="url(#hammer)"/>
    <rect x="22" y="10" width="14" height="2" fill="rgba(255,255,255,0.2)"/>
    <rect x="22" y="14" width="14" height="2" rx="1" fill="#6E7681"/>
    <rect x="20" y="11" width="2" height="4" rx="1" fill="#6E7681"/>
  </g>

  <!-- Sparks -->
  <rect class="s1" x="29" y="31" width="2" height="2" fill="#FFD700"/>
  <rect class="s2" x="33" y="31" width="1.5" height="1.5" fill="#FF6B35"/>
  <rect class="s3" x="27" y="31" width="1.5" height="1.5" fill="#FFA500"/>
  <rect class="s4" x="31" y="30" width="1.5" height="1.5" fill="#FFF"/>

  <!-- Copilot sparkles -->
  <g class="tk1">
    <line x1="52" y1="6" x2="52" y2="14" stroke="url(#cpGrad)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="48" y1="10" x2="56" y2="10" stroke="url(#cpGrad)" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <g class="tk2">
    <line x1="8" y1="11" x2="8" y2="17" stroke="url(#cpGrad)" stroke-width="1" stroke-linecap="round"/>
    <line x1="5" y1="14" x2="11" y2="14" stroke="url(#cpGrad)" stroke-width="1" stroke-linecap="round"/>
  </g>
</svg>