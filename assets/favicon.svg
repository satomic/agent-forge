<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" shape-rendering="crispEdges">
  <defs>
    <radialGradient id="g" cx="50%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#FF6B35" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FF3D00" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="a" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C9D1D9"/>
      <stop offset="100%" stop-color="#8B949E"/>
    </linearGradient>
    <linearGradient id="c" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1F6FEB"/>
      <stop offset="100%" stop-color="#6E40C9"/>
    </linearGradient>
  </defs>
  <style>
    @keyframes s{0%{transform:rotate(0)}15%{transform:rotate(-14deg)}35%{transform:rotate(4deg)}50%{transform:rotate(0)}100%{transform:rotate(0)}}
    .h{transform-origin:20px 12px;animation:s 2.4s ease-in-out infinite}
    @keyframes t{0%{transform:scale(0);opacity:0}50%{transform:scale(1);opacity:1}100%{transform:scale(0);opacity:0}}
    .k{transform-origin:27px 5px;animation:t 2s ease-in-out 0.5s infinite}
    @keyframes p{0%{opacity:0.3}50%{opacity:0.7}100%{opacity:0.3}}
    .gw{animation:p 3s ease-in-out infinite}
  </style>

  <!-- Glow -->
  <ellipse class="gw" cx="16" cy="16" rx="10" ry="8" fill="url(#g)" opacity="0.5"/>

  <!-- Anvil -->
  <rect x="9" y="24" width="14" height="2" fill="url(#a)"/>
  <rect x="11" y="19" width="10" height="5" fill="url(#a)"/>
  <rect x="8" y="16" width="16" height="3" fill="#C9D1D9"/>
  <polygon points="8,16 8,19 5,17.5" fill="#AFB8C1"/>
  <rect x="23" y="16" width="2" height="3" fill="#AFB8C1"/>
  <!-- Hot spot -->
  <rect x="13" y="16" width="4" height="2" fill="#FF6B35" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.4s" repeatCount="indefinite"/>
  </rect>

  <!-- Hammer -->
  <g class="h">
    <rect x="14" y="7" width="2" height="9" fill="#9A6534" transform="rotate(-6,15,11)"/>
    <rect x="11" y="5" width="8" height="4" rx="1" fill="#8B949E"/>
    <rect x="11" y="5" width="8" height="1" fill="rgba(255,255,255,0.2)"/>
    <rect x="10" y="6" width="1" height="2" fill="#6E7681"/>
  </g>

  <!-- Sparkle -->
  <g class="k">
    <line x1="27" y1="3" x2="27" y2="7" stroke="url(#c)" stroke-width="1" stroke-linecap="round"/>
    <line x1="25" y1="5" x2="29" y2="5" stroke="url(#c)" stroke-width="1" stroke-linecap="round"/>
  </g>
</svg>