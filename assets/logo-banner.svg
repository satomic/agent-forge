<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200" shape-rendering="crispEdges">
  <defs>
    <pattern id="pixelGrid" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="none"/>
      <rect width="3.5" height="3.5" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>
    <radialGradient id="forgeGlow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#FF6B35" stop-opacity="0.9">
        <animate attributeName="stop-opacity" values="0.9;1;0.5;0.9" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#FF3D00" stop-opacity="0.4">
        <animate attributeName="stop-opacity" values="0.4;0.7;0.2;0.4" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#FF3D00" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="anvilBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C9D1D9"/>
      <stop offset="40%" stop-color="#8B949E"/>
      <stop offset="100%" stop-color="#6E7681"/>
    </linearGradient>
    <linearGradient id="anvilFace" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D0D7DE"/>
      <stop offset="50%" stop-color="#C9D1D9"/>
      <stop offset="100%" stop-color="#AFB8C1"/>
    </linearGradient>
    <linearGradient id="hammerHead" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8B949E"/>
      <stop offset="100%" stop-color="#6E7681"/>
    </linearGradient>
    <linearGradient id="hammerHandle" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C4A1E"/>
      <stop offset="50%" stop-color="#9A6534"/>
      <stop offset="100%" stop-color="#7C4A1E"/>
    </linearGradient>
    <linearGradient id="copilotGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1F6FEB"/>
      <stop offset="100%" stop-color="#6E40C9"/>
    </linearGradient>
    <linearGradient id="copilotGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#58A6FF"/>
      <stop offset="100%" stop-color="#BC8CFF"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E6EDF3"/>
      <stop offset="40%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#C9D1D9"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="30%" stop-color="#FF3D00"/>
      <stop offset="70%" stop-color="#6E40C9"/>
      <stop offset="100%" stop-color="#1F6FEB"/>
    </linearGradient>
    <radialGradient id="ambientGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6B35" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#6E40C9" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <style>
    @keyframes assembleAnvil {
      0% { transform: translate(0, 40px); opacity: 0; }
      60% { transform: translate(0, 40px); opacity: 0; }
      80% { transform: translate(0, -3px); opacity: 1; }
      90% { transform: translate(0, 1px); opacity: 1; }
      100% { transform: translate(0, 0); opacity: 1; }
    }
    @keyframes assembleHammer {
      0% { transform: translate(0, -40px) rotate(-20deg); opacity: 0; }
      50% { transform: translate(0, -40px) rotate(-20deg); opacity: 0; }
      70% { transform: translate(0, -4px) rotate(2deg); opacity: 1; }
      85% { transform: translate(0, 1px) rotate(-1deg); opacity: 1; }
      100% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
    }
    @keyframes assembleSparks {
      0% { opacity: 0; }
      85% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes assembleText {
      0% { opacity: 0; transform: translateX(20px); }
      70% { opacity: 0; transform: translateX(20px); }
      90% { opacity: 1; transform: translateX(-2px); }
      100% { opacity: 1; transform: translateX(0); }
    }
    @keyframes assembleSubtext {
      0% { opacity: 0; }
      80% { opacity: 0; }
      100% { opacity: 0.6; }
    }
    @keyframes accentDraw {
      0% { stroke-dashoffset: 400; opacity: 0; }
      75% { stroke-dashoffset: 400; opacity: 0; }
      100% { stroke-dashoffset: 0; opacity: 1; }
    }

    .anvil-group { animation: assembleAnvil 1.5s ease-out forwards; }
    .hammer-assembly { animation: assembleHammer 1.5s ease-out forwards; }
    .sparks-glow { animation: assembleSparks 1.5s ease-out forwards; }
    .title-text { animation: assembleText 1.5s ease-out forwards; }
    .subtitle-text { animation: assembleSubtext 1.8s ease-out forwards; }
    .accent-line {
      stroke-dasharray: 400;
      animation: accentDraw 1.8s ease-out forwards;
    }

    @keyframes hammerStrike {
      0% { transform: rotate(0deg); }
      15% { transform: rotate(-18deg); }
      35% { transform: rotate(6deg); }
      42% { transform: rotate(4deg); }
      50% { transform: rotate(0deg); }
      100% { transform: rotate(0deg); }
    }
    .hammer-group {
      transform-origin: 268px 68px;
      animation: hammerStrike 2.4s ease-in-out 1.5s infinite;
    }

    @keyframes spark1 { 0%,30%{transform:translate(0,0);opacity:0}35%{opacity:1}55%{transform:translate(-14px,-18px);opacity:0}100%{opacity:0} }
    @keyframes spark2 { 0%,30%{transform:translate(0,0);opacity:0}35%{opacity:1}55%{transform:translate(10px,-22px);opacity:0}100%{opacity:0} }
    @keyframes spark3 { 0%,32%{transform:translate(0,0);opacity:0}37%{opacity:1}57%{transform:translate(-18px,-10px);opacity:0}100%{opacity:0} }
    @keyframes spark4 { 0%,32%{transform:translate(0,0);opacity:0}37%{opacity:1}57%{transform:translate(16px,-14px);opacity:0}100%{opacity:0} }
    @keyframes spark5 { 0%,33%{transform:translate(0,0);opacity:0}38%{opacity:1}58%{transform:translate(-6px,-26px);opacity:0}100%{opacity:0} }
    @keyframes spark6 { 0%,34%{transform:translate(0,0);opacity:0}39%{opacity:1}59%{transform:translate(5px,-16px);opacity:0}100%{opacity:0} }

    .spark-1 { animation: spark1 2.4s ease-out 1.5s infinite; }
    .spark-2 { animation: spark2 2.4s ease-out 1.5s infinite; }
    .spark-3 { animation: spark3 2.4s ease-out 1.5s infinite; }
    .spark-4 { animation: spark4 2.4s ease-out 1.5s infinite; }
    .spark-5 { animation: spark5 2.4s ease-out 1.5s infinite; }
    .spark-6 { animation: spark6 2.4s ease-out 1.5s infinite; }

    @keyframes glowPulse {
      0% { opacity: 0.3; }
      50% { opacity: 0.75; }
      100% { opacity: 0.3; }
    }
    .forge-glow { animation: glowPulse 3s ease-in-out 1.5s infinite; }

    @keyframes twinkle {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1); opacity: 1; }
      100% { transform: scale(0); opacity: 0; }
    }
    .sparkle-1 { transform-origin: 288px 32px; animation: twinkle 2s ease-in-out 2s infinite; }
    .sparkle-2 { transform-origin: 196px 42px; animation: twinkle 2s ease-in-out 2.7s infinite; }
    .sparkle-3 { transform-origin: 300px 72px; animation: twinkle 2s ease-in-out 3.4s infinite; }

    @keyframes titleShimmer {
      0% { opacity: 1; }
      85% { opacity: 1; }
      90% { opacity: 0.7; }
      95% { opacity: 1; }
      100% { opacity: 1; }
    }
    .title-shimmer { animation: titleShimmer 4s ease-in-out 2s infinite; }
  </style>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bgGrad)" rx="12"/>
  <rect width="800" height="200" fill="none" stroke="#30363D" stroke-width="1" rx="12"/>

  <!-- Ambient glow behind icon -->
  <ellipse cx="258" cy="100" rx="80" ry="70" fill="url(#ambientGlow)"/>

  <!-- ===== ICON (centered at x~253) ===== -->

  <!-- Forge glow -->
  <g class="forge-glow sparks-glow">
    <ellipse cx="253" cy="88" rx="36" ry="28" fill="url(#forgeGlow)" opacity="0.5"/>
  </g>

  <!-- Anvil -->
  <g class="anvil-group">
    <rect x="223" y="124" width="60" height="8" rx="1" fill="url(#anvilBody)"/>
    <rect x="231" y="104" width="44" height="20" rx="1" fill="url(#anvilBody)"/>
    <rect x="235" y="100" width="36" height="8" rx="1" fill="#8B949E"/>
    <rect x="215" y="92" width="76" height="8" rx="1" fill="url(#anvilFace)"/>
    <polygon points="215,92 215,100 201,96" fill="#AFB8C1"/>
    <rect x="287" y="92" width="8" height="8" rx="1" fill="#AFB8C1"/>
    <rect x="217" y="92" width="72" height="2" fill="rgba(255,255,255,0.15)"/>
    <rect x="240" y="92" width="16" height="4" rx="1" fill="#FF6B35" opacity="0.5">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.4s" begin="1.5s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Hammer -->
  <g class="hammer-assembly">
    <g class="hammer-group">
      <rect x="244" y="52" width="4" height="40" rx="1" fill="url(#hammerHandle)" transform="rotate(-8, 246, 72)"/>
      <rect x="230" y="44" width="32" height="12" rx="2" fill="url(#hammerHead)"/>
      <rect x="230" y="44" width="32" height="3" rx="1" fill="rgba(255,255,255,0.2)"/>
      <rect x="230" y="52" width="32" height="4" rx="1" fill="#6E7681"/>
      <rect x="226" y="46" width="4" height="8" rx="1" fill="#6E7681"/>
    </g>
  </g>

  <!-- Sparks -->
  <g class="sparks-glow">
    <rect class="spark-1" x="246" y="90" width="3" height="3" fill="#FFD700" rx="0.5"/>
    <rect class="spark-2" x="250" y="90" width="2" height="2" fill="#FF6B35" rx="0.5"/>
    <rect class="spark-3" x="242" y="91" width="2" height="2" fill="#FFA500" rx="0.5"/>
    <rect class="spark-4" x="254" y="90" width="3" height="3" fill="#FFD700" rx="0.5"/>
    <rect class="spark-5" x="248" y="89" width="2" height="2" fill="#FFFFFF" rx="0.5"/>
    <rect class="spark-6" x="252" y="91" width="2" height="2" fill="#FF6B35" rx="0.5"/>
  </g>

  <!-- Copilot Sparkles -->
  <g class="sparkle-1">
    <line x1="288" y1="26" x2="288" y2="38" stroke="url(#copilotGrad1)" stroke-width="2" stroke-linecap="round"/>
    <line x1="282" y1="32" x2="294" y2="32" stroke="url(#copilotGrad1)" stroke-width="2" stroke-linecap="round"/>
    <line x1="283.5" y1="27.5" x2="292.5" y2="36.5" stroke="url(#copilotGrad2)" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="292.5" y1="27.5" x2="283.5" y2="36.5" stroke="url(#copilotGrad2)" stroke-width="1.2" stroke-linecap="round"/>
  </g>
  <g class="sparkle-2">
    <line x1="196" y1="38" x2="196" y2="46" stroke="url(#copilotGrad2)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="192" y1="42" x2="200" y2="42" stroke="url(#copilotGrad2)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="193.5" y1="39.5" x2="198.5" y2="44.5" stroke="url(#copilotGrad1)" stroke-width="1" stroke-linecap="round"/>
    <line x1="198.5" y1="39.5" x2="193.5" y2="44.5" stroke="url(#copilotGrad1)" stroke-width="1" stroke-linecap="round"/>
  </g>
  <g class="sparkle-3">
    <line x1="300" y1="67" x2="300" y2="77" stroke="url(#copilotGrad1)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="295" y1="72" x2="305" y2="72" stroke="url(#copilotGrad1)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="296.8" y1="68.8" x2="303.2" y2="75.2" stroke="url(#copilotGrad2)" stroke-width="1" stroke-linecap="round"/>
    <line x1="303.2" y1="68.8" x2="296.8" y2="75.2" stroke="url(#copilotGrad2)" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- ===== TEXT (balanced with icon) ===== -->

  <g class="title-text title-shimmer">
    <!-- A -->
    <g fill="url(#titleGrad)">
      <rect x="358" y="62" width="4" height="20"/>
      <rect x="374" y="62" width="4" height="20"/>
      <rect x="362" y="58" width="12" height="4"/>
      <rect x="362" y="72" width="12" height="4"/>
    </g>
    <!-- G -->
    <g fill="url(#titleGrad)">
      <rect x="384" y="62" width="4" height="20"/>
      <rect x="388" y="58" width="12" height="4"/>
      <rect x="388" y="78" width="12" height="4"/>
      <rect x="396" y="72" width="4" height="10"/>
      <rect x="392" y="72" width="8" height="4"/>
    </g>
    <!-- E -->
    <g fill="url(#titleGrad)">
      <rect x="408" y="58" width="4" height="24"/>
      <rect x="412" y="58" width="12" height="4"/>
      <rect x="412" y="68" width="8" height="4"/>
      <rect x="412" y="78" width="12" height="4"/>
    </g>
    <!-- N -->
    <g fill="url(#titleGrad)">
      <rect x="430" y="58" width="4" height="24"/>
      <rect x="446" y="58" width="4" height="24"/>
      <rect x="434" y="62" width="4" height="4"/>
      <rect x="438" y="66" width="4" height="4"/>
      <rect x="442" y="70" width="4" height="4"/>
    </g>
    <!-- T -->
    <g fill="url(#titleGrad)">
      <rect x="456" y="58" width="16" height="4"/>
      <rect x="462" y="62" width="4" height="20"/>
    </g>
    <!-- Dash -->
    <g fill="#FF6B35">
      <rect x="478" y="70" width="10" height="4" rx="1"/>
    </g>
    <!-- F -->
    <g fill="url(#titleGrad)">
      <rect x="494" y="58" width="4" height="24"/>
      <rect x="498" y="58" width="12" height="4"/>
      <rect x="498" y="68" width="8" height="4"/>
    </g>
    <!-- O -->
    <g fill="url(#titleGrad)">
      <rect x="516" y="62" width="4" height="16"/>
      <rect x="532" y="62" width="4" height="16"/>
      <rect x="520" y="58" width="12" height="4"/>
      <rect x="520" y="78" width="12" height="4"/>
    </g>
    <!-- R -->
    <g fill="url(#titleGrad)">
      <rect x="542" y="58" width="4" height="24"/>
      <rect x="546" y="58" width="12" height="4"/>
      <rect x="554" y="62" width="4" height="8"/>
      <rect x="546" y="70" width="8" height="4"/>
      <rect x="550" y="74" width="4" height="4"/>
      <rect x="554" y="78" width="4" height="4"/>
    </g>
    <!-- G -->
    <g fill="url(#titleGrad)">
      <rect x="564" y="62" width="4" height="16"/>
      <rect x="568" y="58" width="12" height="4"/>
      <rect x="568" y="78" width="12" height="4"/>
      <rect x="576" y="72" width="4" height="10"/>
      <rect x="572" y="72" width="8" height="4"/>
    </g>
    <!-- E -->
    <g fill="url(#titleGrad)">
      <rect x="586" y="58" width="4" height="24"/>
      <rect x="590" y="58" width="12" height="4"/>
      <rect x="590" y="68" width="8" height="4"/>
      <rect x="590" y="78" width="12" height="4"/>
    </g>
  </g>

  <!-- Accent underline -->
  <line class="accent-line" x1="358" y1="88" x2="602" y2="88" stroke="url(#accentLine)" stroke-width="2" stroke-linecap="round"/>

  <!-- Subtitle -->
  <g class="subtitle-text">
    <text x="358" y="108" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="11" fill="#8B949E" letter-spacing="0.5">
      Context Engineering Toolkit for GitHub Copilot
    </text>
  </g>

  <!-- Sparkle accent near text end -->
  <g opacity="0">
    <animateTransform attributeName="transform" type="scale" values="0;1;0" dur="2.5s" begin="3.5s" repeatCount="indefinite" additive="sum"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="2.5s" begin="3.5s" repeatCount="indefinite"/>
    <line x1="614" y1="60" x2="614" y2="68" stroke="url(#copilotGrad2)" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="610" y1="64" x2="618" y2="64" stroke="url(#copilotGrad2)" stroke-width="1.2" stroke-linecap="round"/>
  </g>

  <!-- Pixel grid overlay -->
  <rect width="800" height="200" fill="url(#pixelGrid)" rx="12" opacity="0.3"/>
</svg>